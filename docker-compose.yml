services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nutricheck
      POSTGRES_PASSWORD: nutricheck
      POSTGRES_DB: nutricheck
    ports:
      - "5433:5432"
    volumes:
      - nutricheck_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutricheck -d nutricheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Load the same vars as local uvicorn (USDA, Supabase JWKS, CORS, user-agent).
    # `environment` below overrides `DATABASE_URL` so the container never uses
    # 127.0.0.1:5433 (that would point at the container itself, not Postgres).
    env_file:
      - path: backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://nutricheck:nutricheck@postgres:5432/nutricheck
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Bind to 0.0.0.0 so a physical iPhone on the same Wi-Fi can reach the API
    # at http://<your-mac-LAN-IP>:8000.
    restart: unless-stopped

volumes:
  nutricheck_pgdata:
